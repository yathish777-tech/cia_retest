{% extends "base.html" %}
{% block title %}Student Registration{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-card" style="max-width:520px;">
    <div class="auth-logo">
      <div class="logo-icon">🎓</div>
      <h1>Student Registration</h1>
      <p>Create your CIA Retest account</p>
    </div>
    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="grid grid-2" style="gap:16px;">
        <div class="form-group">
          <label class="form-label">Full Name <span class="required">*</span></label>
          <input type="text" name="name" class="form-control" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Register Number <span class="required">*</span></label>
          <input type="text" name="register_number" class="form-control" placeholder="e.g. 22CSB001" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address <span class="required">*</span></label>
        <input type="email" name="email" class="form-control" placeholder="your@college.edu" required>
      </div>
      <div class="grid grid-2" style="gap:16px;">
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="text" name="phone" class="form-control" placeholder="10-digit number">
        </div>
        <div class="form-group">
          <label class="form-label">Department</label>
          <select name="department" class="form-control">
            <option value="">Select Department</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Information Technology">Information Technology</option>
            <option value="Electronics">Electronics</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Civil">Civil</option>
            <option value="EEE">EEE</option>
          </select>
        </div>
      </div>
      <div class="grid grid-2" style="gap:16px;">
        <div class="form-group">
          <label class="form-label">Password <span class="required">*</span></label>
          <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password <span class="required">*</span></label>
          <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">
        🎓 Create Account
      </button>
    </form>
    <p class="text-center mt-4" style="margin-top:20px;font-size:13px;color:#6b7280;">
      Already have an account? <a href="{{ url_for('auth.login') }}" style="color:#1a237e;font-weight:700;">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
