{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">📋</div>
      <h1>CIA Retest Portal</h1>
      <p>Department Management System</p>
    </div>
    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label">Email Address <span class="required">*</span></label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password <span class="required">*</span></label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <div class="d-flex justify-between align-center mb-4" style="margin-bottom:20px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
          <input type="checkbox" name="remember"> Remember me
        </label>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">
        🔐 Login to Portal
      </button>
    </form>
    <p class="text-center mt-4" style="margin-top:20px;font-size:13px;color:#6b7280;">
      New student? <a href="{{ url_for('auth.register') }}" style="color:#1a237e;font-weight:700;">Register here</a>
    </p>

{% endblock %}
